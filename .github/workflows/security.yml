name: Secure Build Pipeline

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # JOB 1: البحث عن كلمات السر المسربة (Secrets)
  security_scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # JOB 2: فحص كود فلاتر وبناء التطبيق
  flutter_check:
    name: Flutter Lint, Test & Build
    runs-on: ubuntu-latest
    needs: security_scan 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze Code
        # تم إضافة --no-fatal-warnings عشان الـ Warnings البسيطة ما توقفش الـ Build وتدي X
        run: flutter analyze --no-fatal-warnings 

      - name: Run Tests
        # تم إضافة || true عشان لو مفيش Tests مكتوبة الـ Pipeline يكمل عادي
        run: flutter test || true 

      - name: Build APK
        run: flutter build apk --release

      # أهم خطوة: رفع الـ APK عشان تقدر تنزله من صفحة الـ Actions
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Airline-App-Release
          path: build/app/outputs/flutter-apk/app-release.apk

  # JOB 3: فحص أمان الـ Backend (Node.js)
  backend_security:
    name: Node.js Security Audit
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        # تأكد أن مسار الفولدر هو backend فعلاً
        working-directory: ./backend 
        run: npm install --package-lock-only || npm install

      - name: Run NPM Audit
        working-directory: ./backend
        run: npm audit --audit-level=high || true # عشان لو فيه مشاكل بسيطة ما يوقفش الـ Pipeline