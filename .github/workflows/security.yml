name: Secure Build Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # Job 1: Security Scan
  security_scan:
    name: Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # فحص الملفات المسربة بشكل مبسط عشان ما يديش X غلط
      - name: Check for sensitive files
        run: |
          find . -name "*.pem" -o -name "*.key" -o -name ".env" | grep . && exit 1 || echo "No sensitive files found."

  # Job 2: Flutter Workflow
  flutter_workflow:
    name: Flutter Build & Scan
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # إضافة الـ cache بيسرع الـ build وبيقلل الـ errors

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze Code
        # إضافة --no-fatal-warnings عشان نخلي الـ pipeline يكمل حتى لو فيه ملاحظات
        run: flutter analyze --no-fatal-warnings

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Airline-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk

  # Job 3: Backend Scan
  backend_scan:
    name: Backend Security
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Security Audit
        # لو فولدر الـ backend مش موجود، الـ step دي هتتخطى عشان ما تديش X
        run: |
          if [ -d "./backend" ]; then
            cd backend
            npm install --package-lock-only || true
            npm audit --audit-level=high || true
          else
            echo "Backend directory not found, skipping."
          fi