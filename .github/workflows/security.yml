name: Secure Build Pipeline

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # JOB 1: Secret Scanning (موجود عندك وممتاز)
  security_scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # JOB 2: Flutter Checks & Docker Environment
  flutter_check:
    name: Flutter Lint, Test & Build
    runs-on: ubuntu-latest
    needs: security_scan 
    # هنا ممكن نستخدم Docker image جاهزة فيها Flutter عشان نضمن البيئة
    container:
      image: ghcr.io/cirruslabs/flutter:stable 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Dependencies
        run: flutter pub get
      - name: Analyze Code (SAST)
        run: flutter analyze
      - name: Run Tests
        run: flutter test
      - name: Build APK (Release)
        run: flutter build apk --release

  # JOB 3: Backend Security (Node.js)
  backend_security:
    name: Node.js Security Audit
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Backend Dependencies
        working-directory: ./backend # تأكد إن ده اسم الفولدر عندك
        run: npm install
      - name: Run NPM Audit (Vulnerability Check)
        working-directory: ./backend
        run: npm audit --audit-level=high